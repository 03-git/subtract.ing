<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>h2 vs h1.1</title>
<style>
html,body{margin:0;background:#000;color:#fff;font:14px/1.6 ui-monospace,Menlo,Consolas,monospace;padding:2rem}
button{font:inherit;background:#000;color:#6f6;border:1px solid #333;padding:.5rem 1.5rem;cursor:pointer;margin:.25rem}
button:hover{border-color:#6f6}
button:disabled{color:#333;border-color:#222;cursor:default}
.result{margin:.75rem 0;padding:.5rem .75rem;border-left:2px solid #333}
.result.h2{border-color:#6f6}
.result.h1{border-color:#fc6}
.winner{color:#6f6;font-weight:bold}
pre{margin:1.5rem 0;white-space:pre-wrap;opacity:.7}
h2{font-size:1rem;font-weight:normal;opacity:.5;margin:1.5rem 0 .5rem}
</style>
</head>
<body>

<div>h2 multiplexing vs h1.1 — same backend, same requests, browser rules</div>
<pre id="config"></pre>

<button id="run" onclick="runBench()">run bench</button>
<button onclick="document.getElementById('out').textContent=''">clear</button>

<h2>results</h2>
<div id="out"></div>

<script>
const H2_URL = 'https://localhost:8094/v1/chat/completions';
const H1_URL = 'http://localhost:9997/v1/chat/completions';
const CONCURRENT = [1, 3, 6, 12];
const BODY = JSON.stringify({model:"test",messages:[{role:"user",content:"bench"}],max_tokens:10});

document.getElementById('config').textContent =
  'h2 endpoint: ' + H2_URL + '\n' +
  'h1 endpoint: ' + H1_URL + '\n' +
  'concurrency levels: ' + CONCURRENT.join(', ') + '\n' +
  'each request: 200ms backend latency';

async function timeN(url, n) {
  const t0 = performance.now();
  const promises = [];
  for (let i = 0; i < n; i++) {
    promises.push(fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: BODY
    }).then(r => r.json()));
  }
  await Promise.all(promises);
  return Math.round(performance.now() - t0);
}

async function runBench() {
  const btn = document.getElementById('run');
  const out = document.getElementById('out');
  btn.disabled = true;

  for (const n of CONCURRENT) {
    out.innerHTML += '<div style="opacity:.5;margin-top:1rem">── ' + n + ' concurrent ──</div>';

    // h1.1 first
    let h1ms;
    try {
      h1ms = await timeN(H1_URL, n);
      out.innerHTML += '<div class="result h1">h1.1 × ' + n + ': ' + h1ms + 'ms</div>';
    } catch(e) {
      out.innerHTML += '<div class="result h1">h1.1 × ' + n + ': failed (' + e.message + ')</div>';
      h1ms = null;
    }

    // h2
    let h2ms;
    try {
      h2ms = await timeN(H2_URL, n);
      out.innerHTML += '<div class="result h2">h2   × ' + n + ': ' + h2ms + 'ms</div>';
    } catch(e) {
      out.innerHTML += '<div class="result h2">h2   × ' + n + ': failed (' + e.message + ')</div>';
      h2ms = null;
    }

    if (h1ms && h2ms) {
      const ratio = (h1ms / h2ms).toFixed(1);
      const diff = h1ms - h2ms;
      if (diff > 0) {
        out.innerHTML += '<div class="winner">h2 wins by ' + diff + 'ms (' + ratio + '×)</div>';
      } else if (diff < 0) {
        out.innerHTML += '<div style="color:#fc6">h1.1 wins by ' + (-diff) + 'ms</div>';
      } else {
        out.innerHTML += '<div style="opacity:.5">tie</div>';
      }
    }

    // pause between rounds
    await new Promise(r => setTimeout(r, 500));
  }

  btn.disabled = false;
}
</script>
</body>
</html>
