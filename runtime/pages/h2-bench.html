<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>h2 vs h1.1</title>
<style>
html,body{margin:0;background:#000;color:#fff;font:14px/1.6 ui-monospace,Menlo,Consolas,monospace;padding:2rem}
button{font:inherit;background:#000;color:#6f6;border:1px solid #333;padding:.5rem 1.5rem;cursor:pointer;margin:.25rem}
button:hover{border-color:#6f6}
button:disabled{color:#333;border-color:#222;cursor:default}
.result{margin:.75rem 0;padding:.5rem .75rem;border-left:2px solid #333}
.result.h2{border-color:#6f6}
.result.h1{border-color:#fc6}
.winner{color:#6f6;font-weight:bold}
pre{margin:1.5rem 0;white-space:pre-wrap;opacity:.7}
h2{font-size:1rem;font-weight:normal;opacity:.5;margin:1.5rem 0 .5rem}
</style>
</head>
<body>

<div>h2 multiplexing vs h1.1 — same backend, same requests, browser rules</div>
<pre id="config"></pre>

<span id="progress" style="opacity:.5"></span>

<h2>summary</h2>
<pre id="summary"></pre>

<h2>raw passes</h2>
<div id="out"></div>

<script>
const H2_URL = 'https://localhost:8094/v1/chat/completions';
const H1_URL = 'http://localhost:9997/v1/chat/completions';
const CONCURRENT = [1, 3, 6, 12];
const PASSES = 10;
const BODY = JSON.stringify({model:"test",messages:[{role:"user",content:"bench"}],max_tokens:10});

document.getElementById('config').textContent =
  'h2 endpoint: ' + H2_URL + '\n' +
  'h1 endpoint: ' + H1_URL + '\n' +
  'concurrency levels: ' + CONCURRENT.join(', ') + '\n' +
  'passes: ' + PASSES + '\n' +
  'each request: 200ms backend latency';

async function timeN(url, n) {
  const t0 = performance.now();
  const promises = [];
  for (let i = 0; i < n; i++) {
    promises.push(fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: BODY
    }).then(r => r.json()));
  }
  await Promise.all(promises);
  return Math.round(performance.now() - t0);
}

function stats(arr) {
  const n = arr.length;
  const mean = Math.round(arr.reduce((a,b) => a+b, 0) / n);
  const sorted = [...arr].sort((a,b) => a-b);
  const med = sorted[Math.floor(n/2)];
  const min = sorted[0];
  const max = sorted[n-1];
  const sd = Math.round(Math.sqrt(arr.reduce((s,v) => s + (v-mean)**2, 0) / n));
  return {mean, med, min, max, sd};
}

async function runFull() {
  const btn = document.getElementById('run');
  const out = document.getElementById('out');
  const prog = document.getElementById('progress');
  const sum = document.getElementById('summary');
  btn.disabled = true;
  out.textContent = '';
  sum.textContent = '';

  const data = {};
  for (const c of CONCURRENT) data[c] = {h1: [], h2: []};

  for (let p = 0; p < PASSES; p++) {
    prog.textContent = 'pass ' + (p+1) + '/' + PASSES;
    out.innerHTML += '<div style="opacity:.3;margin-top:.75rem">── pass ' + (p+1) + ' ──</div>';

    for (const n of CONCURRENT) {
      let h1ms = null, h2ms = null;
      try { h1ms = await timeN(H1_URL, n); } catch(e) {}
      try { h2ms = await timeN(H2_URL, n); } catch(e) {}
      if (h1ms !== null) data[n].h1.push(h1ms);
      if (h2ms !== null) data[n].h2.push(h2ms);

      const line = 'c=' + String(n).padStart(2) +
        '  h1=' + (h1ms !== null ? String(h1ms).padStart(5) : ' fail') +
        '  h2=' + (h2ms !== null ? String(h2ms).padStart(5) : ' fail') +
        (h1ms && h2ms ? '  Δ=' + String(h1ms - h2ms).padStart(5) : '');
      out.innerHTML += '<div style="opacity:.6;font-size:.85rem">' + line + '</div>';

      await new Promise(r => setTimeout(r, 200));
    }
  }

  prog.textContent = 'done';

  let report = 'concurrent  protocol  mean    med   min   max    sd\n';
  report +=    '─────────  ────────  ────  ─────  ────  ────  ────\n';
  for (const c of CONCURRENT) {
    if (data[c].h1.length) {
      const s = stats(data[c].h1);
      report += String(c).padStart(9) + '      h1.1  ' +
        String(s.mean).padStart(4) + '  ' + String(s.med).padStart(5) + '  ' +
        String(s.min).padStart(4) + '  ' + String(s.max).padStart(4) + '  ' +
        String(s.sd).padStart(4) + '\n';
    }
    if (data[c].h2.length) {
      const s = stats(data[c].h2);
      report += '              h2  ' +
        String(s.mean).padStart(4) + '  ' + String(s.med).padStart(5) + '  ' +
        String(s.min).padStart(4) + '  ' + String(s.max).padStart(4) + '  ' +
        String(s.sd).padStart(4) + '\n';
    }
    if (data[c].h1.length && data[c].h2.length) {
      const h1m = stats(data[c].h1).mean;
      const h2m = stats(data[c].h2).mean;
      const ratio = (h1m / h2m).toFixed(1);
      report += '           ratio  ' + ratio + '×' +
        (h1m > h2m ? '  h2 wins' : h1m < h2m ? '  h1 wins' : '  tie') + '\n';
    }
    report += '\n';
  }

  sum.textContent = report;
  btn.disabled = false;
}

runFull();
</script>
</body>
</html>
