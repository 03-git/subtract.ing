<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noai, noimageai">
    <title>subtract.ing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .prompt {
            width: min(600px, 85vw);
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 24px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        .text {
            font-family: -apple-system, "Segoe UI", sans-serif;
            font-size: 1.1rem;
            color: #e0e0e0;
            flex: 1;
        }
        .cursor {
            width: 2px;
            height: 1.3rem;
            background: #e0e0e0;
            margin-left: 1px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="prompt">
        <span class="text">subtract.ing</span>
        <span class="cursor"></span>
    </div>
</body>
</html>
